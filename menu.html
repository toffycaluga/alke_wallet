<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Menú principal - Alke Wallet</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/loader.css">
</head>

  <body>
    <main class="wallet-container">
      <section class="card wallet-card shadow">
        <div class="card-body p-4 p-md-5">
          <h2 class="wallet-title text-center mb-4">Menú Principal</h2>

          <div id="message-container"></div>

          <div class="balance-card p-4 mb-4 text-center">
            <p class="mb-1">Saldo disponible</p>

            <h3 class="display-6 fw-bold" id="current-balance">$0</h3>
          </div>

          <div class="d-grid gap-3">
            <button
              type="button"
              class="btn btn-success wallet-button navigation-button"
              data-url="deposit.html"
              data-screen="la pantalla de depósito"
            >
              Depositar
            </button>

            <button
              type="button"
              class="btn btn-primary wallet-button navigation-button"
              data-url="sendmoney.html"
              data-screen="la pantalla de envío de dinero"
            >
              Enviar Dinero
            </button>

            <button
              type="button"
              class="btn btn-outline-dark wallet-button navigation-button"
              data-url="transactions.html"
              data-screen="últimos movimientos"
            >
              Últimos Movimientos
            </button>

            <button
              type="button"
              class="btn btn-outline-danger wallet-button"
              id="logout-button"
            >
              Cerrar sesión
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
