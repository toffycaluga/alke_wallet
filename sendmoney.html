<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Abraham Lillo - Toffy Caluga" />
    <meta
      name="description"
      content="Alke Wallet es una billetera digital educativa desarrollada con HTML, CSS, Bootstrap, JavaScript y jQuery para el bootcamp de desarrollo fullstack java."
    />
    <title>Últimos movimientos - Alke Wallet</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/loader.css" />
  </head>

  <body>

        <main class="wallet-container">
      <section class="card wallet-card shadow">
        <div class="card-body p-4 p-md-5">
          <h2 class="wallet-title text-center mb-4">Enviar Dinero</h2>

          <div id="message-container"></div>

          <div class="alert alert-secondary">
            Saldo disponible:
            <strong id="send-current-balance">$0</strong>
          </div>

          <div class="mb-3">
            <label for="contact-search" class="form-label">
              Buscar en la agenda
            </label>

            <input
              type="search"
              class="form-control"
              id="contact-search"
              placeholder="Buscar por nombre o alias"
            />
          </div>

          <form id="send-money-form">
            <div class="mb-3">
              <label for="contact-select" class="form-label">
                Selecciona un contacto
              </label>

              <select class="form-select" id="contact-select" required>
                <option value="">Selecciona un contacto</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="send-amount" class="form-label">
                Monto a enviar
              </label>

              <div class="input-group">
                <span class="input-group-text">$</span>

                <input
                  type="number"
                  class="form-control"
                  id="send-amount"
                  min="1"
                  step="1"
                  required
                />
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary wallet-button">
                Enviar dinero
              </button>

              <button
                type="button"
                class="btn btn-success wallet-button"
                data-bs-toggle="modal"
                data-bs-target="#contactModal"
              >
                Agregar nuevo contacto
              </button>

              <a
                href="menu.html"
                class="btn btn-outline-secondary wallet-button"
              >
                Volver al menú
              </a>
            </div>
          </form>
        </div>
      </section>
    </main>

    <!-- Modal para agregar contactos -->

    <div
      class="modal fade"
      id="contactModal"
      tabindex="-1"
      aria-labelledby="contactModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form id="contact-form">
            <div class="modal-header">
              <h2 class="modal-title fs-5" id="contactModalLabel">
                Agregar nuevo contacto
              </h2>

              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Cerrar"
              ></button>
            </div>

            <div class="modal-body">
              <div id="contact-message-container"></div>

              <div class="mb-3">
                <label for="contact-name" class="form-label">
                  Nombre y apellido
                </label>

                <input
                  type="text"
                  class="form-control"
                  id="contact-name"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="contact-cbu" class="form-label">
                  Número de CBU
                </label>

                <input
                  type="text"
                  class="form-control"
                  id="contact-cbu"
                  minlength="22"
                  maxlength="22"
                  inputmode="numeric"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="contact-alias" class="form-label"> Alias </label>

                <input
                  type="text"
                  class="form-control"
                  id="contact-alias"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="contact-bank" class="form-label">
                  Nombre del banco
                </label>

                <input
                  type="text"
                  class="form-control"
                  id="contact-bank"
                  required
                />
              </div>
            </div>

            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancelar
              </button>

              <button type="submit" class="btn btn-primary">
                Guardar contacto
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
