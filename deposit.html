<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Depositar - Alke Wallet</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/loader.css" />
  </head>

  <body>
    <main class="wallet-container">
      <section class="card wallet-card shadow">
        <div class="card-body p-4 p-md-5">
          <h2 class="wallet-title text-center mb-4">Depositar</h2>

          <div id="message-container"></div>

          <div class="alert alert-secondary">
            Saldo actual:
            <strong id="deposit-current-balance">$0</strong>
          </div>

          <form id="deposit-form">
            <div class="mb-4">
              <label for="deposit-amount" class="form-label">
                Monto a depositar
              </label>

              <div class="input-group">
                <span class="input-group-text">$</span>

                <input
                  type="number"
                  class="form-control"
                  id="deposit-amount"
                  min="1"
                  step="1"
                  placeholder="Ejemplo: 50000"
                  required
                />
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success wallet-button">
                Realizar depósito
              </button>

              <a
                href="menu.html"
                class="btn btn-outline-secondary wallet-button"
              >
                Volver al menú
              </a>
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
