<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Inicio de sesión - Alke Wallet</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="./assets/css/styles.css">
  <link rel="stylesheet" href="./assets/css/loader.css">
</head>

<body>
      <main class="wallet-container">
    <section class="card wallet-card shadow">
      <div class="card-body p-4 p-md-5">

        <h2 class="wallet-title text-center mb-4">
          Inicio de sesión
        </h2>
        <div id="message-container"></div>
        <form id="login-form" action="menu.html">

          <div class="mb-3">
            <label for="email" class="form-label">
              Email
            </label>

            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="correo@ejemplo.com"
              required
            >
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">
              Contraseña
            </label>

            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Ingresa tu contraseña"
              required
            >
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100 wallet-button"
          >
            Iniciar sesión
          </button>

        </form>

      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
  </script>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
